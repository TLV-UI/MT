name: A自动签到

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v5

    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check permissions
      run: |
        if ! gh workflow enable sync.yml >/dev/null 2>&1; then
          echo ""
          echo "📋 错误原因：GitHub Actions 权限不足。"
          echo "🔧 请按主页README.md的 \"操作教程 → 设置权限\" 图片教程手动设置权限："
          echo ""
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 运行签到
      env:
        ACCOUNTS: ${{ secrets.ACCOUNTS }}
      run: python main.py
